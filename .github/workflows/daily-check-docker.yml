# Проверка конфигов в Docker (CIDR whitelist) и публикация white-list_available (без расширения).
# Сначала configs/available: filter_excluded → filter_docker_configs (CIDR); затем объединение с прежним white-list_available (дедуп, приоритет строк белого списка) - это stdin Docker и white-list_input.
# В финальный white-list_available попадают только результаты текущего Docker-прогона (без доп. подмешивания старых/geo-pass записей после проверки).
# Сначала проверка в контейнере (CIDR), затем speedtest по скорости; на выходе - два файла с дополнительной проверкой по скорости.
# Запускается сразу после успешного завершения workflow "Daily check". Вход: configs/available ∪ configs/white-list_available ∪ configs/ru (мягкий RU-пул из Daily check).

name: Daily DOCKER check

on:
  workflow_run:
    workflows: ["Daily check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: xraycheck-serial
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MODE: single
  LINKS_FILE: links.txt
  OUTPUT_FILE: white-list_available
  OUTPUT_DIR: configs
  OUTPUT_ADD_DATE: 'false'
  MAX_WORKERS: 280
  EXPORT_FORMAT: txt
  ENABLE_CACHE: 'false'
  TEST_URLS: http://www.google.com/generate_204,http://www.cloudflare.com/cdn-cgi/trace
  TEST_URLS_HTTPS: https://www.gstatic.com/generate_204
  REQUIRE_HTTPS: 'true'
  STRONG_STYLE_TEST: 'true'
  STRONG_STYLE_TIMEOUT: 6
  STRONG_MAX_RESPONSE_TIME: 2
  STRONG_DOUBLE_CHECK: 'true'
  STRONG_ATTEMPTS: 4
  REQUESTS_PER_URL: 3
  MIN_SUCCESSFUL_REQUESTS: 3
  MIN_SUCCESSFUL_URLS: 2
  REQUEST_DELAY: 0.1
  CONNECT_TIMEOUT: 5
  CONNECT_TIMEOUT_SLOW: 12
  USE_ADAPTIVE_TIMEOUT: 'false'
  MAX_RETRIES: 1
  MAX_RESPONSE_TIME: 5
  MIN_RESPONSE_SIZE: 0
  MAX_LATENCY_MS: 4500
  VERIFY_HTTPS_SSL: 'false'
  STABILITY_CHECKS: 3
  STABILITY_CHECK_DELAY: 2.5
  STRICT_MODE: 'true'
  STRICT_MODE_REQUIRE_ALL: 'true'
  TEST_POST_REQUESTS: 'false'

  # Speedtest (после проверки в Docker: фильтр по скорости, результат в white-list_available)
  SPEED_TEST_ENABLED: 'true'
  SPEED_TEST_TIMEOUT: 6
  SPEED_TEST_MODE: full
  SPEED_TEST_METRIC: latency
  SPEED_TEST_OUTPUT: separate_file
  SPEED_TEST_REQUESTS: 12
  SPEED_TEST_MIN_SUCCESS_RATIO: 0.25
  SPEED_TEST_MIN_SUCCESS_COUNT: 2
  SPEED_TEST_URL: https://www.gstatic.com/generate_204
  SPEED_TEST_WORKERS: 700
  SPEED_TEST_DOWNLOAD_TIMEOUT: 20
  SPEED_TEST_DOWNLOAD_URL_SMALL: https://speed.cloudflare.com/__down?bytes=250000
  SPEED_TEST_DOWNLOAD_URL_MEDIUM: https://speed.cloudflare.com/__down?bytes=1000000
  MIN_SPEED_THRESHOLD_MBPS: 2
  SPEED_TEST_DEBUG: 'false'
  XRAY_STARTUP_WAIT: 3.0
  XRAY_STARTUP_POLL_INTERVAL: 0.2
  XRAY_PORT_WAIT: 12
  BASE_PORT: 20000

  # strip_vpn_comments.py: текст комментария (после флага страны) для проверенных конфигов
  AUTO_COMMENT: ' verified · t.me/XRayCheck'
  # Docker-проверка не обновляет configs/notworkers (только white-list_available)
  NOTWORKERS_UPDATE_ENABLED: 'false'

  # Предварительный отсев перед Docker: lib.filter_docker_configs. FILTER_DOCKER_CONFIGS_ENABLED=false|0|no - отключить отсев.
  # FILTER_DOCKER_CIDR_ONLY=1 - только попадание IP в cidrlist (файл sni не используется).
  FILTER_DOCKER_CONFIGS_ENABLED: 'true'
  FILTER_DOCKER_CIDR_ONLY: '1'

  # CIDR whitelist: контейнер использует файл cidrlist в корне (обновляется в workflow Update tools по vars.CIDR_WHITELIST_URL).
  # Fallback URL для контейнера, если cidrlist отсутствует (переопределяется из vars.CIDR_WHITELIST_URL).
  CIDR_WHITELIST_URL: ${{ vars.CIDR_WHITELIST_URL || 'https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt' }}
  # Фильтр локации после CIDR/merge перед запуском Docker (например: RU). Пусто - отключить.
  DOCKER_LOCATION_FILTER: RU

jobs:
  preflight-update:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      cidrlist_updated: ${{ steps.update_cidrlist.outputs.cidrlist_updated }}
      cidrlist_lines_before: ${{ steps.update_cidrlist.outputs.cidrlist_lines_before }}
      cidrlist_lines_after: ${{ steps.update_cidrlist.outputs.cidrlist_lines_after }}
    env:
      CIDR_WHITELIST_URL: ${{ vars.CIDR_WHITELIST_URL || 'https://raw.githubusercontent.com/hxehex/russia-mobile-internet-whitelist/refs/heads/main/cidrwhitelist.txt' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attempt to update cidrlist from CIDR_WHITELIST_URL (if changed)
        id: update_cidrlist
        run: |
          set -e
          LINES_BEFORE=$(wc -l < cidrlist 2>/dev/null || echo 0)
          echo "Preflight: fetching CIDR list from CIDR_WHITELIST_URL..."
          content=$(curl -sLf --connect-timeout 15 --max-time 30 "$CIDR_WHITELIST_URL") || { echo "::warning::Failed to fetch CIDR list, cidrlist unchanged"; echo "cidrlist_updated=false" >> $GITHUB_OUTPUT; exit 0; }
          echo "$content" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/remote_cidr
          if [ ! -s /tmp/remote_cidr ]; then
            echo "::warning::Remote CIDR list is empty (no non-comment lines), cidrlist unchanged"
            echo "cidrlist_updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          local_body=""
          if [ -f cidrlist ]; then
            first=$(head -n 1 cidrlist)
            if [ "${first#\#}" != "$first" ]; then
              local_body=$(tail -n +2 cidrlist)
            else
              local_body=$(cat cidrlist)
            fi
          fi
          echo "$local_body" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/local_cidr
          if diff -q /tmp/local_cidr /tmp/remote_cidr >/dev/null 2>&1; then
            echo "cidrlist unchanged (same content as remote), skip"
            echo "cidrlist_updated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S') UTC" > cidrlist
          echo "$content" >> cidrlist
          LINES_AFTER=$(wc -l < cidrlist)
          echo "cidrlist_updated=true" >> $GITHUB_OUTPUT
          echo "cidrlist_lines_before=$LINES_BEFORE" >> $GITHUB_OUTPUT
          echo "cidrlist_lines_after=$LINES_AFTER" >> $GITHUB_OUTPUT
          echo "cidrlist updated locally"

      - name: Attempt to update Xray and Hysteria binaries (tools/)
        run: |
          bash tools/update-binaries.sh || echo "::warning::tools/update-binaries.sh failed, continuing with existing tools/"

      - name: Commit and push if tools/cidrlist changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -Eq '^( M|A |\?\?) (tools/|cidrlist)'; then
            git add cidrlist tools/xray tools/hysteria 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore: update tools/cidrlist [automated]"
              if ! git pull --rebase origin main; then
                echo "::warning::git pull --rebase failed, skipping push"
                git rebase --abort || true
                exit 0
              fi
              git push || echo "::warning::git push failed, continuing"
            fi
          else
            echo "No changes in tools/ or cidrlist, skip push"
          fi

  docker-check-and-publish:
    needs: preflight-update
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    outputs:
      stats_workflow_name: ${{ steps.telegram_stats.outputs.workflow_name }}
      stats_keys_in: ${{ steps.telegram_stats.outputs.keys_in }}
      stats_keys_out: ${{ steps.telegram_stats.outputs.keys_out }}
      stats_duration: ${{ steps.telegram_stats.outputs.duration }}
      stats_cidrlist_line: ${{ steps.telegram_stats.outputs.cidrlist_line }}
    env:
      XRAY_PATH: ${{ github.workspace }}/tools/xray
      HYSTERIA_PATH: ${{ github.workspace }}/tools/hysteria

    steps:
      - name: Record start time
        id: start
        run: echo "started_at=$(date -u +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Xray and Hysteria binaries (required for Docker build)
        run: bash tools/setup-binaries.sh

      - name: Ensure .env exists for docker compose
        run: touch .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Reset Docker Hub auth (avoid stale credentials)
        run: |
          docker logout docker.io || true
          docker logout https://index.docker.io/v1/ || true

      - name: Build Docker image
        run: docker compose build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: db-ip MMDB cache month (RU geo)
        if: env.DOCKER_LOCATION_FILTER == 'RU'
        id: dbip_month
        run: echo "month=$(date -u +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Restore db-ip country MMDB
        if: env.DOCKER_LOCATION_FILTER == 'RU'
        id: mmdb_cache
        uses: actions/cache/restore@v4
        with:
          path: configs/dbip-country-lite.mmdb
          key: dbip-country-lite-${{ runner.os }}-${{ steps.dbip_month.outputs.month }}

      - name: Fetch db-ip country MMDB if cache miss
        if: env.DOCKER_LOCATION_FILTER == 'RU' && steps.mmdb_cache.outputs.cache-hit != 'true'
        run: python tools/fetch_dbip_country_lite_mmdb.py configs/dbip-country-lite.mmdb

      - name: Filter excluded endpoints
        env:
          EXCLUDE_ENDPOINTS: ${{ vars.EXCLUDE_ENDPOINTS }}
          EXCLUDE_ENDPOINTS_LOG_DETAILS: "false"
        run: |
          if [ -f "configs/available" ] && [ -s "configs/available" ]; then
            python -m lib.filter_excluded_endpoints configs/available -o configs/available_filt.txt && mv configs/available_filt.txt configs/available
          fi

      - name: Filter configs for Docker (cidrlist; CIDR-only)
        if: env.DOCKER_LOCATION_FILTER != 'RU'
        run: |
          FDC="${FILTER_DOCKER_CONFIGS_ENABLED:-true}"
          case "$FDC" in
            true|True|TRUE|1|yes|Yes|YES)
              if [ -f "configs/available" ] && [ -s "configs/available" ]; then
                python -m lib.filter_docker_configs configs/available -o configs/available_docker_filt.txt && mv configs/available_docker_filt.txt configs/available
              fi
              ;;
            *)
              echo "FILTER_DOCKER_CONFIGS_ENABLED=$FDC - отсев lib.filter_docker_configs пропущен, configs/available не меняется."
              ;;
          esac

      - name: Build pre-merge RU geo_only from input configs/available
        if: env.DOCKER_LOCATION_FILTER == 'RU'
        run: |
          if [ -f "configs/available" ] && [ -s "configs/available" ]; then
            python -m lib.filter_configs_by_cidr_and_geo configs/available \
              --location "${DOCKER_LOCATION_FILTER}" \
              --cidr-file cidrlist \
              --output-geo /tmp/available_geo_pass_premerge \
              --output-cidr-geo /tmp/available_cidr_geo_pass_premerge \
              --output-geo-only configs/available_geo_only \
              --geo-cache-file configs/geoip_cache.json \
              --geo-mmdb configs/dbip-country-lite.mmdb \
              --geo-delay 0.35
            echo "Prepared pre-merge configs/available_geo_only from input configs/available"
          else
            rm -f "configs/available_geo_only"
            echo "configs/available is empty before merge; pre-merge geo_only cleared"
          fi

      # Белый список подмешивается в configs/available до Docker, чтобы пройти полную проверку заново в текущем запуске.
      # Приоритет у новых строк из configs/available; white-list_available используется как дополнение.
      - name: Merge white-list_available with CIDR-filtered available (stdin Docker)
        run: |
          python -c "
          import os
          import sys
          sys.path.insert(0, os.getcwd())
          from lib.parsing import normalize_proxy_link

          def log(msg):
              print(msg, flush=True)

          avail = 'configs/available'
          wl = 'configs/white-list_available'
          ru_extra = 'configs/ru'

          def clear_docker_input():
              try:
                  os.remove(avail)
              except FileNotFoundError:
                  pass

          has_avail = os.path.isfile(avail) and os.path.getsize(avail) > 0
          has_wl = os.path.isfile(wl) and os.path.getsize(wl) > 0
          has_ru = os.path.isfile(ru_extra) and os.path.getsize(ru_extra) > 0
          if not has_avail and not has_wl and not has_ru:
              log('Нет данных: пустой available, нет white-list_available и нет configs/ru - нечего проверять.')
              clear_docker_input()
              sys.exit(0)
          log('')
          log('=== daily-check-docker: сводка по объединению (после CIDR по available) ===')
          log('Порядок: configs/available (приоритет), затем white-list_available, затем configs/ru (мягкий RU-пул из Daily check).')
          lines_by_norm = {}
          for path, label in ((avail, 'configs/available'), (wl, 'configs/white-list_available'), (ru_extra, 'configs/ru')):
              if not os.path.isfile(path) or os.path.getsize(path) == 0:
                  log(f'[1] {label}: файл отсутствует или пуст -> 0 записей')
                  continue
              added_this = 0
              with open(path, 'r', encoding='utf-8') as f:
                  for line in f:
                      s = line.rstrip(chr(10)).strip()
                      if not s or s.startswith('#'):
                          continue
                      link = s.split('#', 1)[0].strip() if '#' in s else s.split(maxsplit=1)[0].strip()
                      norm = normalize_proxy_link(link)
                      if norm and norm not in lines_by_norm:
                          lines_by_norm[norm] = s
                          added_this += 1
              log(f'[1] {label}: добавлено уникальных по нормализованному ключу +{added_this} (всего накоплено: {len(lines_by_norm)})')
          if not lines_by_norm:
              log('Итого: 0 валидных конфигов после объединения - очищаем вход Docker (иначе остался бы старый configs/available).')
              clear_docker_input()
              sys.exit(0)
          merged = list(lines_by_norm.values())
          os.makedirs('configs', exist_ok=True)
          with open(avail, 'w', encoding='utf-8') as f:
              f.write(chr(10).join(merged) + chr(10))
          log(f'[2] Итого на вход Docker: {len(merged)} уникальных конфигов (configs/available + копия в white-list_input)')
          log('=== конец сводки ===')
          log('')
          "
          if [ -f "configs/available" ]; then
            cp "configs/available" "configs/white-list_input"
            echo "configs/white-list_input: $(wc -l < configs/available | tr -d ' ') строк (вход проверки в Docker)"
          else
            rm -f "configs/white-list_input"
          fi

      - name: Split merged configs by CIDR+geo (for Docker stdin / final list)
        run: |
          if [ "${DOCKER_LOCATION_FILTER}" = "RU" ]; then
            python -m lib.filter_configs_by_cidr_and_geo configs/available \
              --location "${DOCKER_LOCATION_FILTER}" \
              --cidr-file cidrlist \
              --output-geo configs/available_geo_pass \
              --output-cidr-geo configs/available_cidr_geo_pass \
              --geo-cache-file configs/geoip_cache.json \
              --geo-mmdb configs/dbip-country-lite.mmdb \
              --geo-delay 0.35
            mv configs/available_cidr_geo_pass configs/available
          else
            # Legacy mode: use CIDR-based filter as before
            python -m lib.filter_configs_by_location_ip configs/available \
              --location "${DOCKER_LOCATION_FILTER}" \
              --cidr-file cidrlist \
              --fail-open
          fi

      # В контейнере проверяются все протоколы: VLESS, VMess, Trojan, Shadowsocks, Hysteria.
      # Список только через stdin (после merge на раннере); fallback по URL к raw configs/available не используется - иначе обошли бы CIDR и merge.
      - name: "Run checker in Docker (all protocols: Xray + Hysteria)"
        run: |
          touch .before-docker-run
          echo "CIDR: настройки сетей берутся из локального файла cidrlist (корень репо), в контейнере монтируется как /app/cidrlist и применяется в entrypoint для iptables."
          FDC="${FILTER_DOCKER_CONFIGS_ENABLED:-true}"
          case "$FDC" in
            true|True|TRUE|1|yes|Yes|YES)
              echo "Перед запуском: configs/available = отфильтрованный по CIDR список из Daily check ∪ прежний white-list_available (дедуп; белый список без повторного CIDR-отсева на этом шаге)."
              ;;
            *)
              echo "Перед запуском: отсев filter_docker_configs отключён (FILTER_DOCKER_CONFIGS_ENABLED=$FDC); затем к available после exclude подмешан white-list_available (см. шаг Merge)."
              ;;
          esac
          if [ -f "cidrlist" ]; then echo "cidrlist в репо: $(wc -l < cidrlist | tr -d ' ') строк"; else echo "::warning::cidrlist отсутствует, контейнер возьмёт список по CIDR_WHITELIST_URL"; fi
          if [ -f "configs/available" ] && [ -s "configs/available" ]; then
            N=$(wc -l < "configs/available" | tr -d ' ')
            echo "Передача в контейнер: $N строк из configs/available (через stdin)"
            cat configs/available | docker compose run --rm -T \
            -e OUTPUT_FILE="$OUTPUT_FILE" \
            -e GITHUB_ACTIONS=true \
            -e OUTPUT_DIR="$OUTPUT_DIR" \
            -e MODE="$MODE" \
            -e NOTWORKERS_UPDATE_ENABLED="$NOTWORKERS_UPDATE_ENABLED" \
            -e OUTPUT_ADD_DATE="$OUTPUT_ADD_DATE" \
            -e MAX_WORKERS="$MAX_WORKERS" \
            -e EXPORT_FORMAT="$EXPORT_FORMAT" \
            -e ENABLE_CACHE="$ENABLE_CACHE" \
            -e TEST_URLS="$TEST_URLS" \
            -e TEST_URLS_HTTPS="$TEST_URLS_HTTPS" \
            -e REQUIRE_HTTPS="$REQUIRE_HTTPS" \
            -e STRONG_STYLE_TEST="$STRONG_STYLE_TEST" \
            -e STRONG_STYLE_TIMEOUT="$STRONG_STYLE_TIMEOUT" \
            -e STRONG_MAX_RESPONSE_TIME="$STRONG_MAX_RESPONSE_TIME" \
            -e STRONG_DOUBLE_CHECK="$STRONG_DOUBLE_CHECK" \
            -e STRONG_ATTEMPTS="$STRONG_ATTEMPTS" \
            -e REQUESTS_PER_URL="$REQUESTS_PER_URL" \
            -e MIN_SUCCESSFUL_REQUESTS="$MIN_SUCCESSFUL_REQUESTS" \
            -e MIN_SUCCESSFUL_URLS="$MIN_SUCCESSFUL_URLS" \
            -e REQUEST_DELAY="$REQUEST_DELAY" \
            -e CONNECT_TIMEOUT="$CONNECT_TIMEOUT" \
            -e CONNECT_TIMEOUT_SLOW="$CONNECT_TIMEOUT_SLOW" \
            -e USE_ADAPTIVE_TIMEOUT="$USE_ADAPTIVE_TIMEOUT" \
            -e MAX_RETRIES="$MAX_RETRIES" \
            -e MAX_RESPONSE_TIME="$MAX_RESPONSE_TIME" \
            -e MIN_RESPONSE_SIZE="$MIN_RESPONSE_SIZE" \
            -e MAX_LATENCY_MS="$MAX_LATENCY_MS" \
            -e VERIFY_HTTPS_SSL="$VERIFY_HTTPS_SSL" \
            -e STABILITY_CHECKS="$STABILITY_CHECKS" \
            -e STABILITY_CHECK_DELAY="$STABILITY_CHECK_DELAY" \
            -e STRICT_MODE="$STRICT_MODE" \
            -e STRICT_MODE_REQUIRE_ALL="$STRICT_MODE_REQUIRE_ALL" \
            -e TEST_POST_REQUESTS="$TEST_POST_REQUESTS" \
            -e SPEED_TEST_ENABLED="$SPEED_TEST_ENABLED" \
            -e SPEED_TEST_TIMEOUT="$SPEED_TEST_TIMEOUT" \
            -e SPEED_TEST_MODE="$SPEED_TEST_MODE" \
            -e SPEED_TEST_METRIC="$SPEED_TEST_METRIC" \
            -e SPEED_TEST_OUTPUT="$SPEED_TEST_OUTPUT" \
            -e SPEED_TEST_REQUESTS="$SPEED_TEST_REQUESTS" \
            -e SPEED_TEST_MIN_SUCCESS_RATIO="$SPEED_TEST_MIN_SUCCESS_RATIO" \
            -e SPEED_TEST_MIN_SUCCESS_COUNT="$SPEED_TEST_MIN_SUCCESS_COUNT" \
            -e SPEED_TEST_URL="$SPEED_TEST_URL" \
            -e SPEED_TEST_WORKERS="$SPEED_TEST_WORKERS" \
            -e SPEED_TEST_DOWNLOAD_TIMEOUT="$SPEED_TEST_DOWNLOAD_TIMEOUT" \
            -e SPEED_TEST_DOWNLOAD_URL_SMALL="$SPEED_TEST_DOWNLOAD_URL_SMALL" \
            -e SPEED_TEST_DOWNLOAD_URL_MEDIUM="$SPEED_TEST_DOWNLOAD_URL_MEDIUM" \
            -e MIN_SPEED_THRESHOLD_MBPS="$MIN_SPEED_THRESHOLD_MBPS" \
            -e SPEED_TEST_DEBUG="$SPEED_TEST_DEBUG" \
            -e XRAY_STARTUP_WAIT="$XRAY_STARTUP_WAIT" \
            -e XRAY_STARTUP_POLL_INTERVAL="$XRAY_STARTUP_POLL_INTERVAL" \
            -e XRAY_PORT_WAIT="$XRAY_PORT_WAIT" \
            -e BASE_PORT="$BASE_PORT" \
            -e CIDR_WHITELIST_FILE=/app/cidrlist \
            -e CIDR_WHITELIST_URL="$CIDR_WHITELIST_URL" \
            vless-checker -
          else
            echo "No Docker input (configs/available empty). Creating empty Docker output placeholders."
            mkdir -p configs
            : > configs/white-list_available
            : > "configs/white-list_available(top100)"
          fi

      - name: Verify configs/white-list_available
        run: |
          test -f "configs/white-list_available" || (echo "::error::configs/white-list_available not found" && exit 1)
          if [ -f .before-docker-run ] && [ .before-docker-run -nt "configs/white-list_available" ]; then
            echo "::warning::configs/white-list_available was not updated by Docker (0 results or checker wrote elsewhere), using existing file"
          fi
          rm -f .before-docker-run
          echo "Output files:"
          ls -la configs/white-list_available

      - name: Fix permissions on Docker output (container may create files as root)
        run: |
          if [ -f "configs/white-list_available" ]; then sudo chown "$(whoami):$(id -gn)" configs/white-list_available; fi
          if [ -f "configs/white-list_available(top100)" ]; then sudo chown "$(whoami):$(id -gn)" "configs/white-list_available(top100)"; fi

      - name: Append pre-merge RU geo_only to final white-list_available
        if: env.DOCKER_LOCATION_FILTER == 'RU'
        run: |
          if [ -f "configs/available_geo_only" ] && [ -s "configs/available_geo_only" ]; then
            python -c "import textwrap; exec(textwrap.dedent('''
            import os, sys
            sys.path.insert(0, os.getcwd())
            from lib.parsing import normalize_proxy_link

            def read_lines(path):
                if not os.path.isfile(path) or os.path.getsize(path) == 0:
                    return []
                with open(path, 'r', encoding='utf-8') as f:
                    return [ln.rstrip(chr(10)) for ln in f if ln.strip() and not ln.strip().startswith('#')]

            def link_from_line(line):
                s = line.strip().split(maxsplit=1)[0].strip()
                return s.split('#', 1)[0].strip() if '#' in s else s

            base = read_lines('configs/white-list_available')
            add = read_lines('configs/available_geo_only')

            seen = set()
            merged = []

            for l in base:
                n = normalize_proxy_link(link_from_line(l))
                if n and n not in seen:
                    seen.add(n)
                    merged.append(l)

            added = 0
            for l in add:
                n = normalize_proxy_link(link_from_line(l))
                if n and n not in seen:
                    seen.add(n)
                    merged.append(l)
                    added += 1

            with open('configs/white-list_available', 'w', encoding='utf-8') as f:
                f.write(chr(10).join(merged) + (chr(10) if merged else ''))

            print(f'Appended pre-merge geo_only: +{added}, total={len(merged)}')
            '''))"
          else
            echo "No pre-merge configs/available_geo_only to append"
          fi

      - name: Rebuild configs/white-list_available(top100) from final list
        run: |
          mkdir -p configs
          test -f "configs/white-list_available" || (echo "::error::configs/white-list_available not found" && exit 1)
          head -n 100 "configs/white-list_available" > "configs/white-list_available(top100)"
          echo "Rebuilt configs/white-list_available(top100) from final configs/white-list_available"
          ls -la configs/white-list_available "configs/white-list_available(top100)"

      - name: Normalize comments (strip + add flag and AUTO_COMMENT)
        if: env.AUTO_COMMENT != ''
        run: |
          if [ -s "configs/white-list_available" ]; then
            python -m lib.strip_vpn_comments configs/white-list_available -o configs/white-list_available
            echo "Normalized configs/white-list_available"
          fi
          if [ -s "configs/white-list_available(top100)" ]; then
            python -m lib.strip_vpn_comments "configs/white-list_available(top100)" -o "configs/white-list_available(top100)"
            echo "Normalized configs/white-list_available(top100)"
          fi
        env:
          AUTO_COMMENT: ${{ env.AUTO_COMMENT }}

      - name: Commit and push configs/white-list_available, configs/white-list_available(top100), configs/white-list_input
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          python tools/encode_configs_base64.py \
            configs/white-list_available \
            "configs/white-list_available(top100)" \
            configs/white-list_input
          for f in configs/white-list_available "configs/white-list_available(top100)" configs/white-list_input; do
            [ -f "$f" ] && git add "configs/base64/$(basename "$f")"
          done
          if [ -f "configs/white-list_available" ]; then git add configs/white-list_available; fi
          if [ -f "configs/white-list_available(top100)" ]; then git add "configs/white-list_available(top100)"; fi
          if [ -f "configs/white-list_input" ]; then git add configs/white-list_input; fi
          if ! git diff --cached --quiet; then
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            C=$(wc -l < "configs/white-list_available" 2>/dev/null || echo "0")
            C100=$(wc -l < "configs/white-list_available(top100)" 2>/dev/null || echo "0")
            OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
            echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" '.["configs/white-list_available"] = {updated: $t, count: $c} | .["configs/white-list_available(top100)"] = {updated: $t, count: $c100}' > configs/last-updated.json
            git add configs/last-updated.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "update [Docker + speedtest, automated]"
            git stash -u
            git pull --no-rebase origin "${{ github.ref_name }}" || true
            if [ -f .git/MERGE_HEAD ]; then
              if grep -q '^<<<<<<<' configs/last-updated.json 2>/dev/null; then
                git checkout --theirs configs/last-updated.json
                OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
                NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                C=$(wc -l < "configs/white-list_available" 2>/dev/null || echo "0")
                C100=$(wc -l < "configs/white-list_available(top100)" 2>/dev/null || echo "0")
                echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" \
                  '.["configs/white-list_available"] = {updated: $t, count: $c} |
                   .["configs/white-list_available(top100)"] = {updated: $t, count: $c100}' \
                  > configs/last-updated.json
                git add configs/last-updated.json
              fi
              git commit -m "Merge remote; resolve last-updated.json"
            fi
            git stash pop || true
            git push
          else
            echo "configs/white-list_available, top100 и white-list_input без изменений, push не нужен"
          fi

      - name: Prepare Telegram stats
        id: telegram_stats
        run: |
          # Для Telegram берём реальный вход в Docker из white-list_input (копия stdin Docker).
          # Fallback на configs/available оставляем как запасной вариант.
          if [ -f "configs/white-list_input" ]; then
            K_IN=$(wc -l < configs/white-list_input 2>/dev/null || echo 0)
          else
            K_IN=$(wc -l < configs/available 2>/dev/null || echo 0)
          fi
          K_OUT=$(wc -l < configs/white-list_available 2>/dev/null || echo 0)
          END=$(date -u +%s)
          START=${{ steps.start.outputs.started_at }}
          DURATION_SEC=$(( END - START ))
          MM=$(( DURATION_SEC / 60 ))
          SS=$(( DURATION_SEC % 60 ))
          printf -v DURATION "%d:%02d" "$MM" "$SS"
          echo "workflow_name=Daily DOCKER check" >> $GITHUB_OUTPUT
          echo "keys_in=$K_IN" >> $GITHUB_OUTPUT
          echo "keys_out=$K_OUT" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          CIDRLIST_LINE=""
          if [ "${{ needs.preflight-update.outputs.cidrlist_updated }}" = "true" ]; then
            B="${{ needs.preflight-update.outputs.cidrlist_lines_before }}"
            A="${{ needs.preflight-update.outputs.cidrlist_lines_after }}"
            CIDRLIST_LINE="строк ${B} → ${A}"
          fi
          echo "cidrlist_line=$CIDRLIST_LINE" >> $GITHUB_OUTPUT

      - name: Save db-ip country MMDB
        if: success() && env.DOCKER_LOCATION_FILTER == 'RU' && steps.mmdb_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: configs/dbip-country-lite.mmdb
          key: dbip-country-lite-${{ runner.os }}-${{ steps.dbip_month.outputs.month }}

  notify-telegram:
    needs: docker-check-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send workflow stats to Telegram
        uses: ./.github/actions/telegram-workflow-stats
        with:
          workflow_name: ${{ needs.docker-check-and-publish.outputs.stats_workflow_name }}
          keys_in: ${{ needs.docker-check-and-publish.outputs.stats_keys_in }}
          keys_out: ${{ needs.docker-check-and-publish.outputs.stats_keys_out }}
          duration: ${{ needs.docker-check-and-publish.outputs.stats_duration }}
          cidrlist_line: ${{ needs.docker-check-and-publish.outputs.stats_cidrlist_line }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          extra_section: |
            Обновлённые подписки:

            [Full White List](https://whiteprime.github.io/xraycheck/configs/white-list_available)
            [White List (Top 100)](https://whiteprime.github.io/xraycheck/configs/white-list_available%28top100%29)
