      - name: Commit and push configs/available, configs/available(top100), configs/ru, configs/ru(top100)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          python tools/encode_configs_base64.py \
            configs/available \
            "configs/available(top100)" \
            configs/ru \
            "configs/ru(top100)"
          for f in configs/available "configs/available(top100)" configs/ru "configs/ru(top100)"; do
            [ -f "$f" ] && git add "configs/base64/$(basename "$f")"
          done
          if [ -f "configs/available" ]; then git add configs/available; fi
          if [ -f "configs/available(top100)" ]; then git add "configs/available(top100)"; fi
          if [ -f "configs/ru" ]; then git add configs/ru; fi
          if [ -f "configs/ru(top100)" ]; then git add "configs/ru(top100)"; fi
          if ! git diff --cached --quiet; then
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            C=$(wc -l < "configs/available" 2>/dev/null || echo "0")
            C100=$(wc -l < "configs/available(top100)" 2>/dev/null || echo "0")
            CRU=$(wc -l < "configs/ru" 2>/dev/null || echo "0")
            CRU100=$(wc -l < "configs/ru(top100)" 2>/dev/null || echo "0")
            OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
            echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" --argjson cru "$CRU" --argjson cru100 "$CRU100" '.["configs/available"] = {updated: $t, count: $c} | .["configs/available(top100)"] = {updated: $t, count: $c100} | .["configs/ru"] = {updated: $t, count: $cru} | .["configs/ru(top100)"] = {updated: $t, count: $cru100}' > configs/last-updated.json
            git add configs/last-updated.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "actualize notworkers [check + speedtest, automated]"
            git pull --no-rebase origin "${{ github.ref_name }}" || true
            if [ -f .git/MERGE_HEAD ]; then
              if grep -q '^<<<<<<<' configs/last-updated.json 2>/dev/null; then
                git checkout --theirs configs/last-updated.json
                OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
                NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                C=$(wc -l < "configs/available" 2>/dev/null || echo "0")
                C100=$(wc -l < "configs/available(top100)" 2>/dev/null || echo "0")
                CRU=$(wc -l < "configs/ru" 2>/dev/null || echo "0")
                CRU100=$(wc -l < "configs/ru(top100)" 2>/dev/null || echo "0")
                echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" --argjson cru "$CRU" --argjson cru100 "$CRU100" '.["configs/available"] = {updated: $t, count: $c} | .["configs/available(top100)"] = {updated: $t, count: $c100} | .["configs/ru"] = {updated: $t, count: $cru} | .["configs/ru(top100)"] = {updated: $t, count: $cru100}' > configs/last-updated.json
                git add configs/last-updated.json
              fi
              git commit -m "Merge remote; resolve last-updated.json"
            fi
            git push
          else
            echo "No changes, skip push"
          fi

      - name: Prepare Telegram stats
        id: telegram_stats
        run: |
          K_IN=0
          if [ -f configs/notworkers_xray_for_notworkers.txt ]; then
            K_IN=$((K_IN + $(wc -l < configs/notworkers_xray_for_notworkers.txt)))
          elif [ -f configs/notworkers_xray ]; then
            K_IN=$((K_IN + $(wc -l < configs/notworkers_xray)))
          fi
          if [ -f configs/hysteria_input_for_notworkers.txt ]; then
            K_IN=$((K_IN + $(wc -l < configs/hysteria_input_for_notworkers.txt)))
          elif [ -f configs/hysteria_input ]; then
            K_IN=$((K_IN + $(wc -l < configs/hysteria_input)))
          fi
          K_OUT=$(wc -l < configs/available 2>/dev/null || echo 0)
          END=$(date -u +%s)
          START=${{ steps.start.outputs.started_at }}
          DURATION_SEC=$(( END - START ))
          printf -v DURATION "%d:%02d" $(( DURATION_SEC / 60 )) $(( DURATION_SEC % 60 ))
          echo "workflow_name=Actualize notworkers" >> $GITHUB_OUTPUT
          echo "keys_in=$K_IN" >> $GITHUB_OUTPUT
          echo "keys_out=$K_OUT" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          CIDRLIST_LINE=""
          if [ "${{ needs.preflight-update.outputs.cidrlist_updated }}" = "true" ]; then
            B="${{ needs.preflight-update.outputs.cidrlist_lines_before }}"
            A="${{ needs.preflight-update.outputs.cidrlist_lines_after }}"
            CIDRLIST_LINE="строк ${B} → ${A}"
          fi
          echo "cidrlist_line=$CIDRLIST_LINE" >> $GITHUB_OUTPUT

      - name: Save db-ip country MMDB
        if: success() && env.DOCKER_LOCATION_FILTER == 'RU' && steps.mmdb_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: configs/dbip-country-lite.mmdb
          key: dbip-country-lite-${{ runner.os }}-${{ steps.dbip_month.outputs.month }}

      - name: Save geoip JSON cache
        if: always() && env.DOCKER_LOCATION_FILTER == 'RU'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: configs/geoip_cache.json
          key: geoip-${{ github.ref_name }}-c-${{ hashFiles('cidrlist') }}-${{ github.run_id }}

  notify-telegram:
    needs: check-and-actualize-notworkers-sqlite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send workflow stats to Telegram
        uses: ./.github/actions/telegram-workflow-stats
        with:
          workflow_name: ${{ needs.check-and-actualize-notworkers-sqlite.outputs.stats_workflow_name }}
          keys_in: ${{ needs.check-and-actualize-notworkers-sqlite.outputs.stats_keys_in }}
          keys_out: ${{ needs.check-and-actualize-notworkers-sqlite.outputs.stats_keys_out }}
          duration: ${{ needs.check-and-actualize-notworkers-sqlite.outputs.stats_duration }}
          cidrlist_line: ${{ needs.check-and-actualize-notworkers-sqlite.outputs.stats_cidrlist_line }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
          extra_section: |
            Обновлённые подписки:

            [Full Available List](https://whiteprime.github.io/xraycheck/configs/available)
            [Available List (top100)](https://whiteprime.github.io/xraycheck/configs/available%28top100%29)
            [RU](https://whiteprime.github.io/xraycheck/configs/ru)
            [RU(top100)](https://whiteprime.github.io/xraycheck/configs/ru%28top100%29)

