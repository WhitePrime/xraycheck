# Устанавливает или обновляет бинарники Xray и Hysteria в tools/ и файл cidrlist в корне.
# tools: если нет в репо - ставит (latest или фикс. версия при 403); при rate limit оставляет текущие.
# cidrlist: обновляется по ссылке из vars.CIDR_WHITELIST_URL только при отличии содержимого; первая строка - дата/время обновления (# Updated: ... UTC).
# Результат коммитится в репо; Docker-workflow используют tools/ и cidrlist без загрузки.

name: Update tools

on:
  schedule:
    # Раз в неделю (воскресенье 03:00 UTC)
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      stats_workflow_name: ${{ steps.telegram_stats.outputs.workflow_name }}
      stats_duration: ${{ steps.telegram_stats.outputs.duration }}
    steps:
      - name: Record start time
        id: start
        run: echo "started_at=$(date -u +%s)" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cidrlist from CIDR_WHITELIST_URL (if changed)
        if: vars.CIDR_WHITELIST_URL != ''
        env:
          CIDR_WHITELIST_URL: ${{ vars.CIDR_WHITELIST_URL }}
        run: |
          set -e
          echo "Fetching CIDR list from CIDR_WHITELIST_URL..."
          content=$(curl -sLf --connect-timeout 15 --max-time 30 "$CIDR_WHITELIST_URL") || { echo "::warning::Failed to fetch CIDR list, cidrlist unchanged"; exit 0; }
          echo "$content" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/remote_cidr
          if [ ! -s /tmp/remote_cidr ]; then
            echo "::warning::Remote CIDR list is empty (no non-comment lines), cidrlist unchanged"
            exit 0
          fi
          local_body=""
          if [ -f cidrlist ]; then
            first=$(head -n 1 cidrlist)
            if [ "${first#\#}" != "$first" ]; then
              local_body=$(tail -n +2 cidrlist)
            else
              local_body=$(cat cidrlist)
            fi
          fi
          echo "$local_body" | grep -v '^[[:space:]]*$' | grep -v '^[[:space:]]*#' | sort > /tmp/local_cidr
          if diff -q /tmp/local_cidr /tmp/remote_cidr >/dev/null 2>&1; then
            echo "cidrlist unchanged (same content as remote), skip"
            exit 0
          fi
          echo "# Updated: $(date -u '+%Y-%m-%d %H:%M:%S') UTC" > cidrlist
          echo "$content" >> cidrlist
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cidrlist
          git commit -m "chore: update cidrlist [automated]"
          if ! git pull --rebase origin main; then
            echo "::warning::git pull --rebase failed, skipping push"
            git rebase --abort || true
            exit 0
          fi
          git push || echo "::warning::git push failed, continuing"

      - name: Setup Xray and Hysteria (install or update)
        run: bash tools/update-binaries.sh

      - name: Commit and push if tools changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep -q ' tools/'; then
            git add tools/xray tools/hysteria 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "chore(tools): update Xray and Hysteria binaries [automated]"
              git push
            fi
          else
            echo "tools/ unchanged, skip push"
          fi

      - name: Prepare Telegram stats
        id: telegram_stats
        run: |
          END=$(date -u +%s)
          START=${{ steps.start.outputs.started_at }}
          DURATION_SEC=$(( END - START ))
          printf -v DURATION "%d:%02d" $(( DURATION_SEC / 60 )) $(( DURATION_SEC % 60 ))
          echo "workflow_name=Update tools" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT

  notify-telegram:
    needs: update-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Send workflow stats to Telegram
        uses: ./.github/actions/telegram-workflow-stats
        with:
          workflow_name: ${{ needs.update-binaries.outputs.stats_workflow_name }}
          keys_in: ''
          keys_out: ''
          duration: ${{ needs.update-binaries.outputs.stats_duration }}
          bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
